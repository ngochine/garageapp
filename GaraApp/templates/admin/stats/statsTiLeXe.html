{% extends 'admin/master.html' %}
{% block body %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container-fluid mt-4">
    <div class="text-center mb-4">
        <h3 class="fw-bold" style="color: #6f42c1">THỐNG KÊ TỈ LỆ XE</h3>
        <p class="text-muted">
            Biểu đồ doanh thu theo thời gian
        </p>
        <hr class="mx-auto" style="width: 180px; border-top: 3px solid #6f42c1">
    </div>

    <!--  biểu đồ-->
    <div class="d-flex justify-content-between">
    <div class="card shadow-sm col-12 col-sm-6">
        <div class="card-body">
            <table class="table table-striped table-hover">
              <thead>
                    <tr>
                        <th scope="col">Loại xe</th>
                        <th scope="col">Số lượng</th>
                    </tr>
                  </thead>
                  <tbody>
                  {% for s in  loaixe_stats%}
                    <tr>
                        <th scope="row">{{s[1]}}</th>
                         <th scope="row">{{s[2]}}</th>
                    </tr>
                  {% endfor %}
                  </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm col-12 col-sm-6">
        <div class="card-body">
            <canvas id="myChart"></canvas>
        </div>
    </div>
    </div>
</div>

<script>
function drawChart(ctx, myLabel, myData) {
    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: myLabel,
            datasets: [{
                label: 'Tỷ lệ loại xe',
                data: myData,
                backgroundColor: [
                    '#a6cee3','#33a02c','#ffff99','#b15928','#ff7f00',
                    '#fb9a99','#6a3d9a','#1f78b4','#b2df8a','#e31a1c'
                ],
                borderRadius: 1
            }]
        },
        options: {
            responsive: true,
        }
    });
}

window.onload = function () {
    let myLabel = [];
    let myData = [];

    {% for s in loaixe_stats %}
        myLabel.push('{{ s[1] }}');
        myData.push({{ s[2] }});
    {% endfor %}

    const ctx = document.getElementById('myChart');
    drawChart(ctx, myLabel, myData);
};
</script>

{% endblock %}
