{% extends 'admin/master.html' %}

{% block body %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container-fluid mt-4">
    <div class="text-center mb-5">
        <h3 class="fw-bold text-uppercase" style="color: #6f42c1">
            Thống kê doanh thu
        </h3>
        <p class="text-muted mb-2">
            Biểu đồ doanh thu theo thời gian
        </p>
        <hr class="mx-auto" style="width: 180px; border-top: 3px solid #6f42c1;">
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get">
                <div class="d-flex justify-content-between align-items-end col-12">
                    <div class="col-4 d-flex justify-content-between">
                        <p class="form-label fw-semibold">Thống kê theo</p>
                        <select class="form-select col-6" name="time">
                            <option value="month" {%if request.args.get('time') == 'month'%} selected {% endif %}>Theo tháng</option>
                            <option value="day"{%if request.args.get('time') == 'day'%} selected {% endif %} >Theo ngày</option>
                        </select>
                    </div>
                    <div class="col-6 d-flex justify-content-between">
                        <p class="form-label fw-semibold">Thời gian</p>
                        <input type="month" class="form-control" name="month_year" value="{{ request.args.get('month_year', current_month) }}" required>
                    </div>
                    <div class="col-2">
                        <button type="submit" class="btn fw-semibold" style="background-color: #6f42c1; color: #ffffff">
                            Thống kê
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <canvas id="myChart" height="100"></canvas>
        </div>
    </div>

</div>

<script>
    function drawChart(ctx, myLabel, myData) {
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: myLabel,
            datasets: [{
                label: 'Doanh thu (triệu VNĐ)',
                data: myData,
                backgroundColor: [
                    '#a6cee3','#33a02c','#ffff99','#b15928','#ff7f00',
                    '#fb9a99','#6a3d9a','#1f78b4','#b2df8a','#e31a1c'
                ],
                borderRadius: 1,
                tension: 0.1
            },
            {
                type: 'line',
                label: 'Doanh thu (triệu VNĐ)',
                backgroundColor: '#b2df8a',
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1,
                data: myData,
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top'
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

window.onload = function () {
    let myLabel = [];
    let myData = [];

     {% for s in doanhthu_stats %}
        myLabel.push('{{ s[0] }}');
        myData.push({{ s[1] }});
    {% endfor %}

    const ctx = document.getElementById('myChart');
    drawChart(ctx, myLabel, myData);
};
</script>

{% endblock %}
